name: Organismo Mensal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1 * *"

jobs:
  monthly-organism-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run monthly organism cycle
        run: python scripts/run_observatory_cycle.py

      - name: Validate monthly organism cycle
        run: python scripts/check_observatory_cycle.py

      - name: Upload monthly organism artifacts
        uses: actions/upload-artifact@v4
        with:
          name: organismo-mensal
          path: data/output/
