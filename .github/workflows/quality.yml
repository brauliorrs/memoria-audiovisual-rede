name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile Python modules
        run: |
          python -m py_compile app/streamlit_app.py
          python -m py_compile src/memoria_audiovisual/analysis.py
          python -m py_compile src/memoria_audiovisual/ape_exports.py
          python -m py_compile src/memoria_audiovisual/dashboard_data.py
          python -m py_compile src/memoria_audiovisual/discovery.py
          python -m py_compile src/memoria_audiovisual/european_aggregators.py
          python -m py_compile src/memoria_audiovisual/europe_closure.py
          python -m py_compile src/memoria_audiovisual/european_protocols.py
          python -m py_compile src/memoria_audiovisual/euscreen.py
          python -m py_compile src/memoria_audiovisual/euscreen_exports.py
          python -m py_compile src/memoria_audiovisual/output_files.py
          python -m py_compile src/memoria_audiovisual/organism.py
          python -m py_compile src/memoria_audiovisual/pares.py
          python -m py_compile src/memoria_audiovisual/pares_exports.py
          python -m py_compile src/memoria_audiovisual/pipeline.py
          python -m py_compile src/memoria_audiovisual/snapshot_metadata.py
          python -m py_compile src/memoria_audiovisual/timeline.py
          python -m py_compile scripts/build_ape_analytics.py
          python -m py_compile scripts/build_euscreen_analytics.py
          python -m py_compile scripts/build_ina_analytics.py
          python -m py_compile scripts/build_pares_analytics.py
          python -m py_compile scripts/build_europe_closure_report.py
          python -m py_compile scripts/check_ape_outputs.py
          python -m py_compile scripts/check_euscreen_outputs.py
          python -m py_compile scripts/check_ina_outputs.py
          python -m py_compile scripts/check_deployment_ready.py
          python -m py_compile scripts/check_observatory_cycle.py
          python -m py_compile scripts/check_pares_outputs.py
          python -m py_compile scripts/evaluate_european_aggregators.py
          python -m py_compile scripts/prototype_archiveshub_protocol.py
          python -m py_compile scripts/prototype_francearchives_protocol.py
          python -m py_compile scripts/run_euscreen_pipeline.py
          python -m py_compile scripts/run_ina_pipeline.py
          python -m py_compile scripts/run_observatory_cycle.py
          python -m py_compile scripts/run_pares_pipeline.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check deployment snapshot
        run: python scripts/check_deployment_ready.py
