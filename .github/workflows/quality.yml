name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile Python modules
        run: |
          python -m py_compile app/streamlit_app.py
          python -m py_compile src/memoria_audiovisual/analysis.py
          python -m py_compile src/memoria_audiovisual/ape_exports.py
          python -m py_compile src/memoria_audiovisual/dashboard_data.py
          python -m py_compile src/memoria_audiovisual/output_files.py
          python -m py_compile src/memoria_audiovisual/pipeline.py
          python -m py_compile src/memoria_audiovisual/snapshot_metadata.py
          python -m py_compile scripts/build_ape_analytics.py
          python -m py_compile scripts/check_ape_outputs.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
